<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposit Verifier</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at top, rgba(34,197,94,.18), transparent 25%),
        radial-gradient(circle at bottom, rgba(59,130,246,.18), transparent 25%),
        linear-gradient(180deg,#031611,#0b1f1b,#020617);
      padding:16px;
    }

    .app{
      width:100%;
      max-width:430px;
      padding:22px;
      border-radius:28px;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 20px 50px rgba(0,0,0,.4);
      text-align:center;
    }

    .title{
      font-size:28px;
      font-weight:800;
      margin-bottom:6px;
    }

    .sub{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:18px;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px 16px;
      margin-bottom:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:16px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px;
      font-size:18px;
      font-weight:800;
      color:#fff;
      margin-top:8px;
      background:linear-gradient(135deg,#16a34a,#2563eb);
      cursor:pointer;
    }

    .status{
      min-height:22px;
      margin:14px 0 8px;
      color:#e2e8f0;
      font-weight:700;
    }

    .card{
      margin-top:16px;
      display:none;
      border-radius:18px;
      padding:16px;
      background:linear-gradient(135deg, rgba(34,197,94,.92), rgba(14,165,233,.92));
      font-weight:700;
      text-align:left;
      line-height:1.7;
    }

    .card.error{
      background:linear-gradient(135deg, rgba(239,68,68,.92), rgba(249,115,22,.92));
    }

    .muted{
      margin-top:14px;
      font-size:12px;
      color:#94a3b8;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Deposit Verifier</div>
    <div class="sub">Affiliate postback asosida tekshiruv</div>

    <input id="userId" class="input" placeholder="ID kiriting" />
    <button class="btn" onclick="checkDeposit()">Tekshirish</button>

    <div class="status" id="status">Tayyor</div>

    <div class="card" id="card"></div>

    <div class="muted">
      Bu sahifa faqat postback orqali kelgan ma’lumotni ko‘rsatadi.
    </div>
  </div>

  <script>
    async function checkDeposit(){
      const id = document.getElementById("userId").value.trim();
      const status = document.getElementById("status");
      const card = document.getElementById("card");

      card.style.display = "none";
      card.className = "card";

      if(!id){
        status.textContent = "ID kiriting";
        return;
      }

      status.textContent = "Tekshirilmoqda...";

      try {
        const res = await fetch("/check", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ id })
        });

        const data = await res.json();

        if(!data.success){
          status.textContent = "Topilmadi";
          card.classList.add("error");
          card.innerHTML = `
            <div>Natija: topilmadi</div>
            <div>Xabar: ${data.message}</div>
          `;
          card.style.display = "block";
          return;
        }

        status.textContent = "Tasdiqlandi";
        card.innerHTML = `
          <div><b>ID:</b> ${data.id}</div>
          <div><b>Jami depozit:</b> ${data.totalDeposit}$</div>
          <div><b>Depozit soni:</b> ${data.depositCount}</div>
          <div><b>Oxirgi summa:</b> ${data.lastAmount}$</div>
          <div><b>First deposit:</b> ${data.firstDeposit ? "Ha" : "Yo‘q"}</div>
          <div><b>Yangilangan:</b> ${data.updatedAt || "-"}</div>
        `;
        card.style.display = "block";
      } catch (err) {
        status.textContent = "Xatolik";
        card.classList.add("error");
        card.innerHTML = `<div>Server bilan bog‘lanib bo‘lmadi.</div>`;
        card.style.display = "block";
      }
    }
  </script>
</body>
</html>
