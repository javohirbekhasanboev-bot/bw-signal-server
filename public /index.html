<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Signal Tekshiruv</title>
</head>

<body style="background:black;color:white;text-align:center;margin-top:50px;font-family:sans-serif">

<h1>🎯 Signal Tekshiruv</h1>

<input id="id" placeholder="ID yozing" style="padding:10px;width:200px">
<br><br>

<button onclick="check()" style="padding:10px 20px">Tekshir</button>

<h2 id="result"></h2>

<script>
async function check(){
  let id = document.getElementById("id").value;

  let res = await fetch("/check", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id})
  });

  let data = await res.json();

  if(!data.success){
    document.getElementById("result").innerText = data.message;
    return;
  }

  document.getElementById("result").innerText =
    "💰 Depozit: $" + data.deposit + 
    " | 🎯 Signal: " + data.signal;
}
</script>

</body>
</html>
